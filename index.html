<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henry Capistrano — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function () {
  emailjs.init({
    publicKey: "Pa-PzT1jVj2K4OK2j"
  });
})();
</script>

<style>
body{
  margin:0;
  background:#0e0e0d;
  color:#fff;
  font-family:'Syne',sans-serif;
}

section{
  padding:60px 5%;
}

.contact-form{
  max-width:600px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:1rem;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:0.4rem;
}

.form-group label{
  font-size:0.8rem;
  color:#aaa;
}

.form-group input,
.form-group textarea{
  background:#161614;
  border:1px solid rgba(76,175,80,0.2);
  color:#fff;
  padding:1rem;
  font-size:1rem;
  outline:none;
}

.form-group textarea{
  min-height:150px;
  resize:vertical;
}

.btn-primary{
  background:#4CAF50;
  color:#000;
  border:none;
  padding:1rem;
  cursor:pointer;
  font-weight:700;
}

.btn-primary:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:1rem 1.5rem;
  transform:translateY(100px);
  opacity:0;
  transition:0.3s;
  z-index:999;
}

.toast.show{
  transform:translateY(0);
  opacity:1;
}

.toast.success{
  background:#4CAF50;
  color:#000;
}

.toast.error{
  background:#c0392b;
  color:#fff;
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<section id="contact">

  <div class="contact-form">

    <div class="form-group">
      <label>Your Name</label>
      <input
        type="text"
        id="from_name"
        placeholder="Juan dela Cruz"
        required
      >
    </div>

    <div class="form-group">
      <label>Your Email</label>
      <input
        type="email"
        id="from_email"
        placeholder="juan@email.com"
        required
      >
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea
        id="message"
        placeholder="Hey, I'd love to connect..."
        required
      ></textarea>
    </div>

    <button
      class="btn-primary"
      id="sendBtn"
      type="button"
      onclick="sendEmail()"
    >
      Send Message
    </button>

  </div>

</section>

<script>

/* ── Toast ── */
function showToast(msg, type){

  const toast = document.getElementById("toast");

  toast.textContent = msg;
  toast.className = "toast " + type + " show";

  setTimeout(() => {
    toast.classList.remove("show");
  }, 4000);
}

/* ── EmailJS ── */
function sendEmail(){

  const btn = document.getElementById("sendBtn");

  const name = document.getElementById("from_name").value.trim();
  const email = document.getElementById("from_email").value.trim();
  const message = document.getElementById("message").value.trim();

  if(!name || !email || !message){

    showToast(
      "Please fill in all fields.",
      "error"
    );

    return;
  }

  btn.disabled = true;
  btn.innerText = "Sending...";

  const templateParams = {

    from_name: name,
    from_email: email,
    reply_to: email,
    message: message,
    to_name: "Henry"

  };

  emailjs.send(
    "service_69yj6af",
    "template_a6znh8p",
    templateParams
  )

  .then(function(response){

    console.log(
      "SUCCESS!",
      response.status,
      response.text
    );

    showToast(
      "Message sent successfully!",
      "success"
    );

    document.getElementById("from_name").value = "";
    document.getElementById("from_email").value = "";
    document.getElementById("message").value = "";

  })

  .catch(function(error){

    console.error(
      "FAILED...",
      error
    );

    showToast(
      "Failed to send message.",
      "error"
    );

  })

  .finally(function(){

    btn.disabled = false;
    btn.innerText = "Send Message";

  });
}

</script>

</body>
</html>
